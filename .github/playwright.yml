name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Выберите набор тестов для запуска'
        type: choice
        options:
          - all
          - bottom-slider
          - checkout 
          - login
          - top-slider
        default: all

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run all tests
        if: ${{ github.event.inputs.test_suite == 'all' }}
        run: npx playwright test

      - name: Run Bottom-slider tests
        if: ${{ github.event.inputs.test_suite == 'bottom-slider' }}
        run: npx playwright test --grep @bottom-slider

      - name: Run Checkout tests
        if: ${{ github.event.inputs.test_suite == 'checkout' }}
        run: npx playwright test --grep @checkout
      
      - name: Run Login tests
        if: ${{ github.event.inputs.test_suite == 'login' }}
        run: npx playwright test --grep @login

      - name: Run Top-slider tests
        if: ${{ github.event.inputs.test_suite == 'top-slider' }}
        run: npx playwright test --grep @top-slider


      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30